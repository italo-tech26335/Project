<script>
  /* ========================================================================
   * COMPARTILHADO-UTILIDADES🔧
   * Sessão, autenticação e utilitários de data — usados por todas as páginas.
   * Cada página deve definir SESSAO_TOKEN, USUARIO_NOME e USUARIO_PERFIL
   * antes de incluir este arquivo.
   * ======================================================================== */

  // ── Sessão (preenchidos via template em cada página) ──────────────────────
  // Exemplo em cada página:
  //   var SESSAO_TOKEN   = '<?= sessaoToken ?>';
  //   var USUARIO_NOME   = '<?= usuarioNome ?>';
  //   var USUARIO_PERFIL = '<?= usuarioPerfil ?>';

  // ── Perfis disponíveis ────────────────────────────────────────────────────
  var PERFIS = { ADMIN: 'admin', USUARIO: 'usuario', VISUALIZADOR: 'visualizador' };

  // ── Verifica sessão no cliente e executa callback se válida ───────────────
  // callbackSucesso(usuario) é chamado quando a sessão é válida.
  // Em caso de sessão inválida, redireciona para login automaticamente.
  function verificarSessaoCliente(callbackSucesso) {
    if (typeof SESSAO_TOKEN === 'undefined' || !SESSAO_TOKEN) {
      _redirecionarLogin();
      return;
    }
    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.valida) {
          if (typeof callbackSucesso === 'function') callbackSucesso(r.usuario);
        } else {
          _redirecionarLogin();
        }
      })
      .withFailureHandler(function() {
        // Falha transitória (rede/quota) — executa callback sem redirecionar
        // para evitar loop: a sessão foi verificada pelo servidor ao servir a página.
        if (typeof callbackSucesso === 'function') callbackSucesso(null);
      })
      .verificarSessao(SESSAO_TOKEN);
  }

  // ── Logout ────────────────────────────────────────────────────────────────
  function fazerLogoutCliente() {
    // Limpa armazenamento local PRIMEIRO (evita auto-login loop)
    localStorage.removeItem('sm_token');
    localStorage.removeItem('sm_usuario');
    sessionStorage.removeItem('sm_token');
    sessionStorage.removeItem('sm_usuario');

    // Invalida sessão no servidor e redireciona
    if (typeof SESSAO_TOKEN !== 'undefined' && SESSAO_TOKEN) {
      google.script.run
        .withSuccessHandler(function() { _redirecionarLogin(); })
        .withFailureHandler(function() { _redirecionarLogin(); })
        .fazerLogout(SESSAO_TOKEN);
    } else {
      _redirecionarLogin();
    }
  }

  // ── Helpers internos ──────────────────────────────────────────────────────
  function _redirecionarLogin() {
    // Guard contra loop infinito
    var tentativas = parseInt(sessionStorage.getItem('_sm_redir') || '0');
    if (tentativas >= 2) {
      sessionStorage.removeItem('_sm_redir');
      localStorage.removeItem('sm_token');
      localStorage.removeItem('sm_usuario');
    } else {
      sessionStorage.setItem('_sm_redir', tentativas + 1);
    }
    var url = (typeof BASE_URL !== 'undefined' && BASE_URL)
      ? BASE_URL
      : (window.location.origin + window.location.pathname);
    window.location.replace(url + '?pagina=login');
  }

  function podeEditar() {
    return typeof USUARIO_PERFIL !== 'undefined' &&
           (USUARIO_PERFIL === PERFIS.ADMIN || USUARIO_PERFIL === PERFIS.USUARIO);
  }

  function ehAdmin() {
    return typeof USUARIO_PERFIL !== 'undefined' && USUARIO_PERFIL === PERFIS.ADMIN;
  }

  // ── Controle de visibilidade da navegação por permissão de página ─────────
  // Oculta links [data-pagina] que o usuário não tem permissão de acessar.
  // PAGINAS_PERMITIDAS deve ser declarada na página ([] = sem restrição).
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof PAGINAS_PERMITIDAS === 'undefined' ||
        !Array.isArray(PAGINAS_PERMITIDAS) ||
        PAGINAS_PERMITIDAS.length === 0) return; // sem restrição

    document.querySelectorAll('[data-pagina]').forEach(function(el) {
      var pag = el.getAttribute('data-pagina');
      if (pag && !PAGINAS_PERMITIDAS.includes(pag)) {
        el.style.display = 'none';
      }
    });
  });

  // ── Utilitários de data ───────────────────────────────────────────────────

  /**
   * Formata uma data ou string de data no padrão dd/mm/aaaa.
   * @param {Date|string|null} valor
   * @returns {string}
   */
  function formatarDataBR(valor) {
    if (!valor) return '';
    var d = (valor instanceof Date) ? valor : new Date(valor);
    if (isNaN(d.getTime())) return '';
    var dia  = String(d.getDate()).padStart(2, '0');
    var mes  = String(d.getMonth() + 1).padStart(2, '0');
    var ano  = d.getFullYear();
    return dia + '/' + mes + '/' + ano;
  }

  /**
   * Retorna a data atual no formato ISO (aaaa-mm-dd), usando fuso de São Paulo.
   * @returns {string}
   */
  function obterDataAtualISO() {
    var agora = new Date();
    var ano  = agora.getFullYear();
    var mes  = String(agora.getMonth() + 1).padStart(2, '0');
    var dia  = String(agora.getDate()).padStart(2, '0');
    return ano + '-' + mes + '-' + dia;
  }

  /**
   * Calcula diferença em dias entre duas datas (ou strings de data).
   * @param {Date|string} inicio
   * @param {Date|string} fim
   * @returns {number} dias (negativo se fim < inicio)
   */
  function calcularDiasEntreDatas(inicio, fim) {
    var dInicio = (inicio instanceof Date) ? inicio : new Date(inicio);
    var dFim    = (fim    instanceof Date) ? fim    : new Date(fim);
    if (isNaN(dInicio.getTime()) || isNaN(dFim.getTime())) return 0;
    return Math.round((dFim - dInicio) / (1000 * 60 * 60 * 24));
  }

  // ── Glass Page Transition Overlay ─────────────────────────────────────────
  // Exibido ao navegar entre páginas (clique em a[data-pagina])
  (function() {
    var css = document.createElement('style');
    css.textContent = [
      '#pageTransitionOverlay{',
        'display:none;position:fixed;inset:0;z-index:99999;',
        'background:rgba(14,6,2,0.50);',
        'backdrop-filter:blur(20px) saturate(160%);',
        '-webkit-backdrop-filter:blur(20px) saturate(160%);',
        'align-items:center;justify-content:center;',
        'animation:_pto_fadeIn 0.25s ease;',
      '}',
      '#pageTransitionOverlay.ativo{display:flex;}',
      '.pto-glass{',
        'background:rgba(250,243,224,0.07);',
        'backdrop-filter:blur(28px);',
        '-webkit-backdrop-filter:blur(28px);',
        'border:1px solid rgba(250,243,224,0.16);',
        'border-radius:24px;',
        'padding:44px 52px;',
        'display:flex;flex-direction:column;align-items:center;gap:20px;',
        'box-shadow:0 8px 48px rgba(0,0,0,0.55),0 2px 12px rgba(0,0,0,0.3),inset 0 1px 0 rgba(250,243,224,0.13);',
        'position:relative;',
      '}',
      '.pto-glass::before{',
        'content:"";position:absolute;top:0;left:12%;right:12%;height:1px;',
        'background:linear-gradient(90deg,transparent,rgba(250,243,224,0.38),transparent);',
      '}',
      '.pto-cup-wrap{position:relative;display:inline-flex;}',
      '.pto-cup{',
        'width:84px;height:84px;',
        'background:linear-gradient(150deg,#5C2A0A 0%,#2C1206 100%);',
        'border-radius:18px;',
        'border:1px solid rgba(212,169,106,0.28);',
        'display:flex;align-items:center;justify-content:center;',
        'box-shadow:0 6px 28px rgba(0,0,0,0.55),0 0 0 4px rgba(44,18,6,0.5),inset 0 1px 0 rgba(255,255,255,0.07);',
        'animation:_pto_float 2s ease-in-out infinite;',
        'position:relative;z-index:1;',
      '}',
      '.pto-cup i{font-size:34px;color:#D4A96A;}',
      '.pto-ring{',
        'position:absolute;inset:-9px;border-radius:26px;',
        'border:2px solid transparent;',
        'border-top-color:rgba(212,169,106,0.80);',
        'border-right-color:rgba(212,169,106,0.20);',
        'animation:_pto_spin 1.1s linear infinite;',
      '}',
      '.pto-label{',
        'font-family:"DM Serif Display",Georgia,serif;',
        'font-size:1rem;font-weight:600;font-style:italic;',
        'color:rgba(250,243,224,0.72);letter-spacing:0.02em;',
      '}',
      '.pto-bar{width:120px;height:2px;background:rgba(212,169,106,0.12);border-radius:99px;overflow:hidden;}',
      '.pto-bar::after{',
        'content:"";display:block;height:100%;',
        'background:linear-gradient(90deg,transparent,#D4A96A,#F5EBD7,#D4A96A,transparent);',
        'animation:_pto_bar 1.5s ease-in-out infinite;',
      '}',
      '@keyframes _pto_fadeIn{from{opacity:0}to{opacity:1}}',
      '@keyframes _pto_float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}',
      '@keyframes _pto_spin{to{transform:rotate(360deg)}}',
      '@keyframes _pto_bar{0%{width:40%;margin-left:-40%}100%{width:40%;margin-left:110%}}'
    ].join('');
    document.head.appendChild(css);

    var overlay = document.createElement('div');
    overlay.id = 'pageTransitionOverlay';
    overlay.innerHTML = [
      '<div class="pto-glass">',
        '<div class="pto-cup-wrap">',
          '<div class="pto-cup">',
            '<i class="fas fa-mug-hot"></i>',
            '<div class="pto-ring"></div>',
          '</div>',
        '</div>',
        '<div class="pto-label">Preparando o café...</div>',
        '<div class="pto-bar"></div>',
      '</div>'
    ].join('');
    document.body.appendChild(overlay);

    document.addEventListener('click', function(e) {
      var link = e.target.closest('a[data-pagina]');
      if (!link) return;
      if (link.classList.contains('ativo')) return; // já está nessa página
      var href = link.href;
      if (!href || href === '#' || href === window.location.href) return;
      e.preventDefault();
      overlay.classList.add('ativo');
      setTimeout(function() { window.location.href = href; }, 380);
    }, true);
  })();
</script>
